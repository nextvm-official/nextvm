name: CI

# Continuous integration for the NextVM framework.
#
#   build        — install + build + test (on every push and pull request)
#   release      — changesets publish to npm + GitHub Releases (main pushes only)
#   deploy-docs  — vitepress build + GitHub Pages deploy (main pushes only)
#
# The release and deploy-docs jobs only run on pushes to the canonical
# main branch of nextvm-official/nextvm. They are no-ops on forks and
# on pull request events.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm run build

      - name: Run all tests
        run: pnpm test

  release:
    name: Release (changesets)
    needs: build
    if: |
      github.repository == 'nextvm-official/nextvm'
      && github.event_name == 'push'
      && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
          scope: '@nextvm'
          always-auth: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm run build

      # Changesets release flow.
      #
      # Two outputs land in this repo automatically:
      #
      #   1. GitHub Releases — one per versioned package, with the
      #      generated CHANGELOG.md entry as the release body.
      #
      #   2. npmjs.org packages — every published package goes to
      #      https://www.npmjs.com/package/@nextvm/<name>. Consumers
      #      install with `npm install @nextvm/core`.
      #
      # On every push to main:
      #   - if .changeset/ contains pending changesets, the action opens
      #     a "Version Packages" PR that bumps versions + updates
      #     CHANGELOG.md.
      #   - if .changeset/ is empty AND there are versioned packages
      #     not yet on npm, the action publishes them and creates
      #     matching GitHub Releases.
      #   - if both are empty, the job is a quiet no-op.
      - name: Verify npm token + scope ownership
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "::group::npm whoami"
          if ! whoami_out=$(npm whoami 2>&1); then
            echo "::error::npm whoami failed: $whoami_out"
            echo "The NPM_TOKEN secret is missing, expired, or not a valid publish token."
            exit 1
          fi
          echo "Authenticated as: $whoami_out"
          echo "::endgroup::"

          echo "::group::Scope ownership check"
          # If @nextvm is a user scope, the token owner must be 'nextvm'.
          # If @nextvm is an org scope, the token owner must be a member of
          # the nextvm org with publish permission. Either way, we can
          # sanity-check by listing packages the token can publish to.
          echo "Packages visible to this token:"
          npm access list packages 2>&1 | head -50 || true
          echo "::endgroup::"

          echo "::group::Can we reach the @nextvm scope at all?"
          # Try to fetch the scope's package listing. If this 404s on a
          # truly non-existent scope, it means the scope has never been
          # claimed and our first PUT will 404 too.
          npm view @nextvm/placeholder 2>&1 | head -10 || true
          echo "::endgroup::"

      - name: Create release pull request or publish
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm changeset publish
          createGithubReleases: true
          commit: "chore: release packages"
          title: "chore: release packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # setup-node@v4 writes ~/.npmrc with the literal placeholder
          # ${NODE_AUTH_TOKEN}, which npm expands from the environment
          # at publish time. If this env var isn't set here the .npmrc
          # resolves to an empty token, npm publishes anonymously, and
          # every PUT 404s with "not in this registry". We set both
          # NODE_AUTH_TOKEN (what npm reads) and NPM_TOKEN (what
          # changesets/action reads for its own auth helpers).
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  deploy-docs:
    name: Deploy docs to Pages
    needs: build
    if: |
      github.repository == 'nextvm-official/nextvm'
      && github.event_name == 'push'
      && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages (so docs can resolve types)
        run: pnpm run build

      - name: Build docs
        run: pnpm run docs:build

      # Pages must be enabled once under repo Settings → Pages →
      # Source: GitHub Actions. From then on this step is a no-op.
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

