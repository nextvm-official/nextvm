# NextVM Full Stack Example — server.cfg snippet
#
# Drop the example folder into your FXServer's resources/ directory
# (or symlink it) and add these lines to your server.cfg.
#
# IMPORTANT: 'core' must come last because it bootstraps the runtime
# and depends on every other module being registered first.

ensure nextvm-banking
ensure nextvm-jobs
ensure nextvm-housing
ensure nextvm-inventory
ensure nextvm-player
ensure nextvm-vehicle
ensure nextvm-core

# Optional MySQL convars (read by nextvm.config.ts)
set mysql_host "localhost"
set mysql_user "root"
set mysql_password ""
set mysql_db "nextvm_example"
